<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do Pro</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="todo-app">

        <div class="top-bar">

            <div>

                <h1>

                    <i class="fa-solid fa-list-check"></i>

                    Smart To-Do

                </h1>

                <p id="greeting"></p>

            </div>

            <button id="themeBtn">

                <i class="fa-solid fa-moon"></i>

            </button>

        </div>

        <div class="stats">

            <div class="card">

                <h2 id="totalTasks">0</h2>

                <p>Total Tasks</p>

            </div>

            <div class="card">

                <h2 id="completedTasks">0</h2>

                <p>Completed</p>

            </div>

            <div class="card">

                <h2 id="pendingTasks">0</h2>

                <p>Pending</p>

            </div>

        </div>

        <div class="progress-section">

            <div class="progress-text">

                <span>Progress</span>

                <span id="progressPercent">

                    0%

                </span>

            </div>

            <div class="progress-bar">

                <div id="progress"></div>

            </div>

        </div>

        <input
            type="text"
            id="search"
            placeholder="🔍 Search tasks..."
        >

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter task..."
            >

            <select id="priority">

                <option value="High">🔴 High</option>

                <option value="Medium" selected>🟡 Medium</option>

                <option value="Low">🟢 Low</option>

            </select>

            <input
                type="date"
                id="dueDate"
            >

            <input
                type="time"
                id="dueTime"
            >

            <button id="addTask">

                <i class="fa-solid fa-plus"></i>

                Add Task

            </button>

        </div>

        <div class="filters">

            <button class="active-filter" data-filter="all">

                All

            </button>

            <button data-filter="pending">

                Pending

            </button>

            <button data-filter="completed">

                Completed

            </button>

            <button id="sortPriority">

                ⭐ Sort Priority

            </button>

            <button id="sortDate">

                📅 Sort Date

            </button>

        </div>

        <ul id="taskList">
                    </ul>

        <div class="bottom-buttons">

            <button id="clearCompleted">

                <i class="fa-solid fa-trash"></i>

                Clear Completed

            </button>

        </div>

    </div>

</div>

<div id="deleteModal" class="modal">

    <div class="modal-content">

        <h2>

            <i class="fa-solid fa-circle-exclamation"></i>

            Delete Task

        </h2>

        <p>

            Are you sure you want to delete this task?

        </p>

        <div class="modal-buttons">

            <button id="cancelDelete">

                Cancel

            </button>

            <button id="confirmDelete">

                Delete

            </button>

        </div>

    </div>

</div>

<div id="toast"></div>

<footer>

    <p>

        <i class="fa-solid fa-code"></i>

        Built with HTML • CSS • JavaScript

    </p>

    <p>

        Developed by <strong>Purvi Jain</strong>

    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
