<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart To-Do App</title>

    <link rel="stylesheet" href="style.css">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

<div class="container">

    <div class="todo-app">

        <div class="top-bar">

            <h1>
                <i class="fa-solid fa-list-check"></i>
                Smart To-Do
            </h1>

            <button id="themeBtn">
                <i class="fa-solid fa-moon"></i>
            </button>

        </div>

        <!-- Statistics -->

        <div class="stats">

            <div class="card">
                <h2 id="totalTasks">0</h2>
                <p>Total</p>
            </div>

            <div class="card">
                <h2 id="completedTasks">0</h2>
                <p>Completed</p>
            </div>

            <div class="card">
                <h2 id="pendingTasks">0</h2>
                <p>Pending</p>
            </div>

        </div>

        <!-- Progress -->

        <div class="progress-section">

            <div class="progress-text">
                Progress
            </div>

            <div class="progress-bar">

                <div id="progress"></div>

            </div>

        </div>

        <!-- Search -->

        <input
            type="text"
            id="search"
            placeholder="Search task..."
        >

        <!-- Input -->

        <div class="input-section">

            <input
                type="text"
                id="taskInput"
                placeholder="Enter Task..."
            >

            <select id="priority">

                <option value="High">🔴 High</option>

                <option value="Medium">🟡 Medium</option>

                <option value="Low">🟢 Low</option>

            </select>

            <input
                type="date"
                id="dueDate"
            >

            <input
                type="time"
                id="dueTime"
            >

            <button id="addTask">
                Add
            </button>

        </div>

        <!-- Filter Buttons -->

        <div class="filters">

            <button data-filter="all">
                All
            </button>

            <button data-filter="pending">
                Pending
            </button>

            <button data-filter="completed">
                Completed
            </button>

            <button id="sortPriority">
                Sort Priority
            </button>

            <button id="sortDate">
                Sort Date
            </button>

        </div>

        <!-- Task List -->

        <ul id="taskList">

        </ul>

        <!-- Bottom Buttons -->

        <div class="bottom-buttons">

            <button id="clearCompleted">
                Clear Completed
            </button>

        </div>

    </div>

</div>

<!-- Toast -->

<div id="toast"></div>

<script src="script.js"></script>

</body>
</html>
